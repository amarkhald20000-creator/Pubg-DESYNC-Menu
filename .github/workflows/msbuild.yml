name: Build C++ EXE

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Setup MSVC Environment
      uses: ilammy/msvc-dev-cmd@v1

    - name: Download DirectX 9 SDK
      run: |
        Invoke-WebRequest -Uri "https://www.nuget.org/api/v2/package/Microsoft.DXSDK.D3DX/9.29.952.8" -OutFile "dxsdk.zip"
        Expand-Archive -Path "dxsdk.zip" -DestinationPath "dxsdk"

    - name: Build the project
      run: |
        $proj = Get-ChildItem -Filter *.vcxproj -Recurse | Select-Object -First 1
        $dxInclude = (Get-ChildItem -Path dxsdk -Filter d3dx9.h -Recurse).Directory.FullName
        $dxLib = (Get-ChildItem -Path dxsdk -Filter d3dx9.lib -Recurse | Where-Object { $_.FullName -match "x64" }).Directory.FullName | Select-Object -First 1
        
        # الحقن الآمن في متغيرات بيئة الويندوز مباشرة
        $env:INCLUDE = "$dxInclude;$env:INCLUDE"
        $env:LIB = "$dxLib;$env:LIB"
        
        Write-Host "Building project: $($proj.FullName)"
        msbuild "$($proj.FullName)" /m /p:Configuration=Release /p:Platform=x64

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Pubg-DESYNC-Ready-Cheat
        path: "**/*.exe"
